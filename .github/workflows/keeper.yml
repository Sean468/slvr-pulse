name: slvr-pulse keeper
# Free, durable settlement: runs the keeper one pass every 5 minutes.
# Add repo secrets: SPEEDY_RPC (or any PulseChain RPC) and DEPLOYER_PK.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

concurrency:
  group: keeper
  cancel-in-progress: false

jobs:
  settle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci || npm install
      - name: settle closed rounds
        env:
          SPEEDY_RPC: ${{ secrets.SPEEDY_RPC }}
          DEPLOYER_PK: ${{ secrets.DEPLOYER_PK }}
          KEEPER_ONCE: "1"
        run: node keeper/keeper.js --once
